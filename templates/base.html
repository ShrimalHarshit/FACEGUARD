<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FaceGuard{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% if session.get('user_id') %}
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">⬡</span>
      <span class="nav-title">FACEGUARD</span>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
      {% if session.get('role') == 'admin' %}
      <a href="{{ url_for('add_user_page') }}" class="nav-link">Add User</a>
      <a href="{{ url_for('manage_users_page') }}" class="nav-link">Manage Users</a>
      <a href="{{ url_for('auth_log_page') }}" class="nav-link">Auth Log</a>
      {% endif %}
      <a href="{{ url_for('logout') }}" class="nav-link nav-logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
